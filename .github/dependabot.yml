version: 2
updates:
  # NuGet — Central Package Management (Directory.Packages.props) is supported.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

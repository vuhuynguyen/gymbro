name: CD

# Builds the API image, publishes it to GHCR, then deploys to the VM by pulling the new image and
# restarting the `api` container (image swap — no build on the host). The API self-applies both EF
# migration chains on boot (Database__AutoMigrate=true on the single-instance VM).
#
# Required repo secrets:  VM_HOST (public IP), VM_USER (ubuntu), DEPLOY_SSH_KEY (private deploy key).
# GHCR auth on the VM uses the workflow's own GITHUB_TOKEN — no long-lived token stored on the host.
on:
  push:
    branches: [main, master]
    tags: ['v*']

# One deploy at a time — never let two pushes race to update the single VM.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Deploy API to the VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ~/gymbro-app
            docker compose pull api
            docker compose up -d api
            docker image prune -f
            docker logout ghcr.io
